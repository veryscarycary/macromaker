<svg width="1500" height="980" viewBox="0 0 1500 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="980" fill="#F1F5F9"/>
  <text x="64" y="86" fill="#0F172A" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700">Round 2: Slate-Leaning Brand Directions</text>
  <text x="64" y="122" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="20">These reduce or remove the soft pastel purple feeling by pushing the brand toward slate, gunmetal, and stormy indigo.</text>

  <rect x="64" y="170" width="1372" height="232" rx="28" fill="#FFFFFF"/>
  <text x="100" y="222" fill="#0F172A" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">4. Slate Indigo</text>
  <rect x="100" y="248" width="176" height="116" rx="18" fill="#94A3B8"/><text x="122" y="316" fill="#0F172A" font-family="Helvetica, Arial, sans-serif" font-size="24">Light</text>
  <rect x="296" y="248" width="176" height="116" rx="18" fill="#475569"/><text x="318" y="316" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Primary</text>
  <rect x="492" y="248" width="176" height="116" rx="18" fill="#334155"/><text x="514" y="316" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Dark</text>
  <rect x="734" y="248" width="176" height="116" rx="18" fill="#0369A1"/><text x="756" y="316" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Carbs</text>
  <rect x="930" y="248" width="176" height="116" rx="18" fill="#4F46E5"/><text x="952" y="316" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Protein</text>
  <rect x="1126" y="248" width="176" height="116" rx="18" fill="#B45309"/><text x="1148" y="316" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Fat</text>
  <text x="100" y="388" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="20">Best if you still want some indigo DNA, but much less softness.</text>

  <rect x="64" y="434" width="1372" height="232" rx="28" fill="#FFFFFF"/>
  <text x="100" y="486" fill="#0F172A" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">5. Gunmetal Brand</text>
  <rect x="100" y="512" width="176" height="116" rx="18" fill="#CBD5E1"/><text x="122" y="580" fill="#0F172A" font-family="Helvetica, Arial, sans-serif" font-size="24">Light</text>
  <rect x="296" y="512" width="176" height="116" rx="18" fill="#334155"/><text x="318" y="580" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Primary</text>
  <rect x="492" y="512" width="176" height="116" rx="18" fill="#1E293B"/><text x="514" y="580" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Dark</text>
  <rect x="734" y="512" width="176" height="116" rx="18" fill="#0F766E"/><text x="756" y="580" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Carbs</text>
  <rect x="930" y="512" width="176" height="116" rx="18" fill="#7C3AED"/><text x="952" y="580" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Protein</text>
  <rect x="1126" y="512" width="176" height="116" rx="18" fill="#C2410C"/><text x="1148" y="580" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Fat</text>
  <text x="100" y="652" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="20">Best if you want the brand itself to feel heavier, quieter, and more serious.</text>

  <rect x="64" y="698" width="1372" height="232" rx="28" fill="#FFFFFF"/>
  <text x="100" y="750" fill="#0F172A" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">6. Storm Indigo</text>
  <rect x="100" y="776" width="176" height="116" rx="18" fill="#B8C0D9"/><text x="122" y="844" fill="#0F172A" font-family="Helvetica, Arial, sans-serif" font-size="24">Light</text>
  <rect x="296" y="776" width="176" height="116" rx="18" fill="#4C566E"/><text x="318" y="844" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Primary</text>
  <rect x="492" y="776" width="176" height="116" rx="18" fill="#2F3A4F"/><text x="514" y="844" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Dark</text>
  <rect x="734" y="776" width="176" height="116" rx="18" fill="#0284C7"/><text x="756" y="844" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Carbs</text>
  <rect x="930" y="776" width="176" height="116" rx="18" fill="#4338CA"/><text x="952" y="844" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Protein</text>
  <rect x="1126" y="776" width="176" height="116" rx="18" fill="#CA8A04"/><text x="1148" y="844" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="24">Fat</text>
  <text x="100" y="916" fill="#475569" font-family="Helvetica, Arial, sans-serif" font-size="20">Best if you want a colder, more technical app personality without going fully neutral.</text>
</svg>
